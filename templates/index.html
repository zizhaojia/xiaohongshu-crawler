<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书爬虫 - Web 管理界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff2442 0%, #ff6b7a 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #ff2442 0%, #ff6b7a 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .section h2 {
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff2442;
        }
        
        .form-group small {
            color: #999;
            font-size: 12px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff2442 0%, #ff6b7a 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 36, 66, 0.4);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
            margin-left: 10px;
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .results-table th,
        .results-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .results-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }
        
        .results-table tr:hover {
            background: #f8f9fa;
        }
        
        .tag {
            display: inline-block;
            padding: 4px 8px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff2442;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .export-buttons {
            margin-top: 20px;
        }
        
        .note-title {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            font-size: 24px;
            color: #ff2442;
            margin-bottom: 5px;
        }
        
        .stat-card p {
            color: #666;
            font-size: 14px;
        }
        
        .warning {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .warning strong {
            color: #d63031;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍠 小红书爬虫工具</h1>
            <p>Web 管理界面 - 仅供学习研究使用</p>
        </div>
        
        <div class="content">
            <div class="warning">
                <strong>⚠️ 重要提示：</strong>
                <ul style="margin-top: 10px; margin-left: 20px;">
                    <li>本工具仅供学习研究，请遵守小红书平台规则</li>
                    <li>爬取频率不宜过高，建议间隔 2-3 秒</li>
                    <li>部分功能需要登录 Cookie 才能使用</li>
                    <li>请尊重用户隐私，不要滥用爬取的数据</li>
                </ul>
            </div>
            
            <div class="status" id="status"></div>
            
            <div class="section">
                <h2>🔍 搜索笔记</h2>
                <div class="form-group">
                    <label>关键词</label>
                    <input type="text" id="keyword" placeholder="例如：美食、旅行、穿搭...">
                </div>
                
                <div class="form-group">
                    <label>获取数量</label>
                    <input type="number" id="maxNotes" value="10" min="1" max="50">
                    <small>最多 50 条（防止触发反爬）</small>
                </div>
                
                <div class="form-group">
                    <label>Cookie（可选，填入可获得更多数据）</label>
                    <textarea id="cookie" rows="3" placeholder="从浏览器开发者工具复制 Cookie..."></textarea>
                    <small>登录后按 F12 -> Network -> 找到请求 -> 复制 Cookie</small>
                </div>
                
                <button class="btn btn-primary" id="searchBtn" onclick="startSearch()">
                    开始爬取
                </button>
            </div>
            
            <div class="section" id="resultsSection" style="display: none;">
                <h2>📊 爬取结果</h2>
                
                <div class="stats" id="stats"></div>
                
                <div class="export-buttons">
                    <button class="btn btn-secondary" onclick="exportJSON()">📥 导出 JSON</button>
                    <button class="btn btn-secondary" onclick="exportExcel()">📊 导出 Excel</button>
                </div>
                
                <div id="resultsTable"></div>
                
                <div id="pagination" style="margin-top: 20px; text-align: center;"></div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalResults = 0;
        let checkStatusInterval = null;

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';
            
            if (type !== 'loading') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 5000);
            }
        }

        function startSearch() {
            const keyword = document.getElementById('keyword').value.trim();
            const maxNotes = parseInt(document.getElementById('maxNotes').value);
            const cookie = document.getElementById('cookie').value.trim();
            
            if (!keyword) {
                showStatus('请输入关键词', 'error');
                return;
            }
            
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = '爬取中...';
            
            showStatus('正在爬取数据，请稍候...', 'loading');
            
            fetch('/api/search', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    keyword: keyword,
                    max_notes: maxNotes,
                    cookie: cookie
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showStatus(data.message, 'success');
                    // 开始轮询状态
                    checkStatusInterval = setInterval(checkStatus, 2000);
                } else {
                    showStatus(data.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '开始爬取';
                }
            })
            .catch(err => {
                showStatus('请求失败: ' + err.message, 'error');
                btn.disabled = false;
                btn.textContent = '开始爬取';
            });
        }

        function checkStatus() {
            fetch('/api/status')
            .then(res => res.json())
            .then(data => {
                if (!data.is_crawling && data.results_count > 0) {
                    clearInterval(checkStatusInterval);
                    document.getElementById('searchBtn').disabled = false;
                    document.getElementById('searchBtn').textContent = '开始爬取';
                    showStatus(`爬取完成！共获取 ${data.results_count} 条笔记`, 'success');
                    loadResults();
                } else if (data.is_crawling) {
                    showStatus(`正在爬取中... 已获取 ${data.results_count} 条笔记`, 'loading');
                }
            });
        }

        function loadResults(page = 1) {
            currentPage = page;
            
            fetch(`/api/results?page=${page}&per_page=10`)
            .then(res => res.json())
            .then(data => {
                totalResults = data.total;
                displayResults(data.data);
                displayStats(data.total);
                document.getElementById('resultsSection').style.display = 'block';
            });
        }

        function displayStats(total) {
            fetch('/api/results?page=1&per_page=1000')
            .then(res => res.json())
            .then(data => {
                const notes = data.data;
                const totalLikes = notes.reduce((sum, n) => sum + (n.likes || 0), 0);
                const totalComments = notes.reduce((sum, n) => sum + (n.comments || 0), 0);
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <h3>${total}</h3>
                        <p>笔记总数</p>
                    </div>
                    <div class="stat-card">
                        <h3>${totalLikes}</h3>
                        <p>总点赞</p>
                    </div>
                    <div class="stat-card">
                        <h3>${totalComments}</h3>
                        <p>总评论</p>
                    </div>
                `;
            });
        }

        function displayResults(notes) {
            if (notes.length === 0) {
                document.getElementById('resultsTable').innerHTML = '<p style="text-align: center; color: #999;">暂无数据</p>';
                return;
            }
            
            let html = `
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>标题</th>
                            <th>作者</th>
                            <th>点赞</th>
                            <th>评论</th>
                            <th>收藏</th>
                            <th>标签</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            notes.forEach(note => {
                const tags = note.tags ? note.tags.map(t => `<span class="tag">${t}</span>`).join('') : '';
                html += `
                    <tr>
                        <td class="note-title" title="${note.title}">${note.title || '无标题'}</td>
                        <td>${note.user ? note.user.nickname : '未知'}</td>
                        <td>${note.likes || 0}</td>
                        <td>${note.comments || 0}</td>
                        <td>${note.collects || 0}</td>
                        <td>${tags}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            document.getElementById('resultsTable').innerHTML = html;
            
            // 分页
            const totalPages = Math.ceil(totalResults / 10);
            let paginationHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `
                    <button class="btn ${i === currentPage ? 'btn-primary' : 'btn-secondary'}" 
                            onclick="loadResults(${i})" style="margin: 0 5px;">
                        ${i}
                    </button>
                `;
            }
            document.getElementById('pagination').innerHTML = paginationHtml;
        }

        function exportJSON() {
            window.location.href = '/api/export/json';
        }

        function exportExcel() {
            window.location.href = '/api/export/excel';
        }
    </script>
</body>
</html>
